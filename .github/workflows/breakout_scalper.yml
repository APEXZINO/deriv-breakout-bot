name: Deriv Breakout Scalper

on:
  schedule:
    - cron: '*/15 * * * *'   # every 15 minutes — H1 breakouts need frequent checks
  workflow_dispatch:

jobs:
  run-scanner:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pandas websockets

      - name: Run Breakout Scalper
        env:
          TG_TOKEN:   ${{ secrets.TG_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
        run: python breakout_scalper.py

      - name: Save cooldown file
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add scalper_cooldown.json || true
          git diff --staged --quiet || git commit -m "Update scalper cooldown"
          git push || true
          
