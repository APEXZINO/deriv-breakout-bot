name: Deriv Breakout Bot

on:
  schedule:
    # Runs every 5 minutes during forex/market hours (adjust as needed)
    - cron: '*/5 * * * *'
  workflow_dispatch:   # allow manual trigger from GitHub UI

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 4   # kill before next cron fires

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run breakout scanner (single pass)
        env:
          DERIV_APP_ID: ${{ secrets.DERIV_APP_ID }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python src/bot_single_pass.py


