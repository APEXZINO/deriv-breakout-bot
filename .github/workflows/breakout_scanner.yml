name: Deriv Breakout Scanner (Real-Time)

on:
  push:
    branches:
      - main
    paths:
      - 'breakout_scanner.py'
      - '.github/workflows/breakout_scanner.yml'
  workflow_dispatch:
  schedule:
    - cron: '0 */6 * * *'  # Start fresh every 6 hours to avoid stale runs

jobs:
  run-scanner:
    runs-on: ubuntu-latest
    timeout-minutes: 360  # 6 hours - GitHub max

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pandas websockets

      - name: Run Breakout Scanner (Real-Time Continuous Mode)
        env:
          TG_TOKEN: ${{ secrets.TG_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
          LIVE_MODE: 'true'
        run: python breakout_scanner.py

      - name: Pull latest changes if workflow updated
        if: always()
        run: git pull origin main || true
